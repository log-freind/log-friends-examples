spring.application.name=order-service
server.port=8081

# Kafka configuration for log-friends agent
logfriends.kafka.brokers=${LOGFRIENDS_KAFKA_BROKERS:localhost:9092}
logfriends.kafka.topic=log-friends.batch
logfriends.kafka.compression.type=none

# Interceptor toggles (v1.1.0)
logfriends.interceptor.http.enabled=true
logfriends.interceptor.logback.enabled=true
logfriends.interceptor.jdbc.enabled=true
logfriends.interceptor.method_trace.enabled=true
logfriends.interceptor.log_event.enabled=true

# Logging configuration
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
