spring.application.name=order-service
server.port=8081

# Console ingest endpoint for log-friends agent
logfriends.ingest.url=${LOGFRIENDS_INGEST_URL:http://localhost:8080/ingest}
logfriends.worker.id=${LOGFRIENDS_WORKER_ID:order-service-local-1}
logfriends.app.version=${LOGFRIENDS_APP_VERSION:examples-v0.3.0}

# Interceptor toggles - set to false to disable individual interceptors
logfriends.interceptor.http.enabled=true
logfriends.interceptor.logback.enabled=true
logfriends.interceptor.jdbc.enabled=true
logfriends.interceptor.method_trace.enabled=true
logfriends.interceptor.log_event.enabled=true
logfriends.trace.threshold.ms=0

# In-memory database used only to demonstrate JDBC capture in the Order flow
spring.datasource.url=jdbc:h2:mem:logfriends_examples;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.sql.init.mode=always

# Logging configuration
logging.level.root=INFO
logging.level.com.example.demo=DEBUG
